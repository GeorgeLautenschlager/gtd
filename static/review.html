<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Weekly Review</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;margin:0;padding:16px;background:#f9fafb}
    .card{background:#fff;padding:12px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:12px}
    .list{display:flex;flex-direction:column;gap:8px}
    .item{display:flex;justify-content:space-between;align-items:center;padding:8px;border-radius:6px;border:1px solid #eee}
    .controls{display:flex;gap:8px}
  </style>
</head>
<body>
  <h1>Weekly Review</h1>
  <div class="card">
    <button id="startBtn">Start Review</button>
    <button id="saveExit">Save & Exit</button>
    <div id="timer">Not started</div>
  </div>

  <div id="checklist" class="card">
    <div id="progress">No session</div>
    <div id="items" class="list"></div>
  </div>

  <div class="card">
    <h3>Reflection</h3>
    <textarea id="notes" style="width:100%;height:120px"></textarea>
    <div style="margin-top:8px"><button id="completeBtn" disabled>Complete Review</button></div>
  </div>

<script>
let session = null;
let timerInterval = null;
function formatElapsed(ms){
  const mins = Math.floor(ms/60000);
  const secs = Math.floor((ms%60000)/1000);
  return `${mins}m ${secs}s`;
}

document.getElementById('startBtn').addEventListener('click', async ()=>{
  const resp = await fetch('/api/review/start', {method:'POST'});
  if(!resp.ok){ alert('Failed to start'); return; }
  session = await resp.json();
  renderSession();
  // start timer
  const start = new Date(session.started_at);
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    document.getElementById('timer').textContent = 'Elapsed: '+formatElapsed(new Date()-start);
  }, 1000);
});

async function renderSession(){
  document.getElementById('progress').textContent = `Progress: ${session.checklist_items.filter(i=>i.completed).length}/${session.checklist_items.length}`;
  const container = document.getElementById('items'); container.innerHTML = '';
  for(const it of session.checklist_items){
    const div = document.createElement('div'); div.className='item';
    div.innerHTML = `<div><strong>${escapeHtml(it.category)}</strong>: ${escapeHtml(it.item_text)}</div>`;
    const controls = document.createElement('div'); controls.className='controls';
    const cb = document.createElement('button'); cb.textContent = it.completed ? 'Done' : 'Mark done';
    cb.disabled = it.completed;
    cb.onclick = ()=>completeItem(it.id);
    controls.appendChild(cb);
    div.appendChild(controls);
    container.appendChild(div);
  }
  document.getElementById('completeBtn').disabled = session.checklist_items.some(i=>!i.completed);
}

async function completeItem(itemId){
  const resp = await fetch(`/api/review/${session.id}/item/${itemId}/complete`, {method:'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({})});
  if(!resp.ok){ alert('Failed'); return; }
  // refresh session
  const r = await fetch(`/api/review/${session.id}`);
  session = await r.json();
  renderSession();
}

document.getElementById('completeBtn').addEventListener('click', async ()=>{
  const notes = document.getElementById('notes').value;
  const resp = await fetch(`/api/review/${session.id}/complete`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({notes})});
  if(!resp.ok){ alert('Failed to complete'); return; }
  session = await resp.json();
  alert('Review completed');
  if(timerInterval) clearInterval(timerInterval);
  renderSession();
});

function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
</script>
</body>
</html>
